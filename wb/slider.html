<html>

<head>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       

        .slider-outer {
            width: 100vw;
            background: #000;
            padding: 14px 0;
            overflow: hidden;
        }

        .slider-track {
            display: flex;
            align-items: center;
            gap: 36px;
            width: max-content;
            animation: scroll 18s linear infinite;
        }

        .slider-track:hover {
            animation-play-state: paused;
        }

        .slider-item {
            display: flex;
            align-items: center;
            gap: 36px;
            flex-shrink: 0;
        }

        .slider-text {
            font-family: 'Baloo 2', cursive;
            font-size: 48px;
            line-height: 72px;
            font-weight: 800;
            color: #fff;
            white-space: nowrap;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            flex-shrink: 0;
        }

        @keyframes scroll {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body>
    <div class="slider-outer">
        <div class="slider-track" id="sliderTrack"></div>
    </div>

    <script>
        const items = ['Bathing', 'Treatment', 'Grooming', 'Treatment', 'Bathing'];

        function buildSet() {
            const set = document.createElement('div');
            set.className = 'slider-item';

            items.forEach((label) => {
                const text = document.createElement('span');
                text.className = 'slider-text';
                text.textContent = label;
                set.appendChild(text);

                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.setAttribute('aria-hidden', 'true');
                set.appendChild(dot);
            });

            return set;
        }

        const track = document.getElementById('sliderTrack');
        track.appendChild(buildSet());
        track.appendChild(buildSet());
    </script>
</body>

</html>
